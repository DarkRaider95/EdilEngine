# ============================================
# EdilEngine - Docker Compose per sviluppo locale
# PostgreSQL 16 + pgvector, Backend, Frontend, Scraper
# ============================================

services:
  # ------------------------------------------
  # Database: PostgreSQL 16 con pgvector
  # ------------------------------------------
  db:
    image: pgvector/pgvector:pg16
    container_name: edilengine-db
    environment:
      POSTGRES_DB: edilengine
      POSTGRES_USER: edilengine
      POSTGRES_PASSWORD: edilengine_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edilengine -d edilengine"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ------------------------------------------
  # Scraper: Python + Scrapy per scraping leggi
  # ------------------------------------------
  scraper:
    build:
      context: ./scraper
      dockerfile: Dockerfile
    container_name: edilengine-scraper
    environment:
      DATABASE_URL: postgresql+asyncpg://edilengine:edilengine_dev@db:5432/edilengine
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-local}
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-paraphrase-multilingual-MiniLM-L12-v2}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-384}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_EMBEDDING_BASE_URL: ${OPENAI_EMBEDDING_BASE_URL:-}
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - scraper  # Attivo solo con: docker compose --profile scraper up
    restart: "no"

  # ------------------------------------------
  # Backend: FastAPI API
  # ------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: edilengine-backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql+asyncpg://edilengine:edilengine_dev@db:5432/edilengine
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-local}
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-paraphrase-multilingual-MiniLM-L12-v2}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-384}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      OPENAI_EMBEDDING_BASE_URL: ${OPENAI_EMBEDDING_BASE_URL:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 120s
    restart: unless-stopped

  # ------------------------------------------
  # Frontend: Next.js 14
  # ------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: edilengine-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

# ------------------------------------------
# Volumi persistenti
# ------------------------------------------
volumes:
  pgdata:
    driver: local

# ------------------------------------------
# Network implicita (default bridge)
# ------------------------------------------
networks:
  default:
    name: edilengine-network
