name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: ${{ secrets.GCP_REGION }}
  GCP_ARTIFACT_REGISTRY: ${{ secrets.GCP_REGION }}-docker.pkg.dev
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ──────────────────────────────────────────────
  # DEPLOY – Backend (Cloud Run Service)
  # ──────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: "read"
      id-token: "write"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.GCP_ARTIFACT_REGISTRY }} --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.GCP_ARTIFACT_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/edilengine/edilengine-backend:${{ env.IMAGE_TAG }}
            ${{ env.GCP_ARTIFACT_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/edilengine/edilengine-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloud-run@v2
        with:
          service: edilengine-api
          region: ${{ env.GCP_REGION }}
          image: ${{ env.GCP_ARTIFACT_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/edilengine/edilengine-backend:${{ env.IMAGE_TAG }}
          env_vars: |
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          secrets: ""
          timeout: "300"
          concurrency: "80"
          max-instances: "10"
          memory: "512Mi"
          cpu: "1"

      - name: Verify deployment
        run: |
          SERVICE_URL=$(gcloud run services describe edilengine-api \
            --region ${{ env.GCP_REGION }} \
            --format "value(status.url)")
          echo "Backend deployed at: ${SERVICE_URL}"

  # ──────────────────────────────────────────────
  # DEPLOY – Frontend (Cloud Run Service)
  # ──────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [deploy-backend]
    permissions:
      contents: "read"
      id-token: "write"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.GCP_ARTIFACT_REGISTRY }} --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.GCP_ARTIFACT_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/edilengine/edilengine-frontend:${{ env.IMAGE_TAG }}
            ${{ env.GCP_ARTIFACT_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/edilengine/edilengine-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloud-run@v2
        with:
          service: edilengine-frontend
          region: ${{ env.GCP_REGION }}
          image: ${{ env.GCP_ARTIFACT_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/edilengine/edilengine-frontend:${{ env.IMAGE_TAG }}
          env_vars: |
            NEXT_PUBLIC_API_URL=${{ steps.deploy-backend.outputs.url || '' }}
          timeout: "300"
          concurrency: "80"
          max-instances: "10"
          memory: "512Mi"
          cpu: "1"

      - name: Verify deployment
        run: |
          SERVICE_URL=$(gcloud run services describe edilengine-frontend \
            --region ${{ env.GCP_REGION }} \
            --format "value(status.url)")
          echo "Frontend deployed at: ${SERVICE_URL}"

  # ──────────────────────────────────────────────
  # DEPLOY – Scraper (Cloud Run Job)
  # ──────────────────────────────────────────────
  deploy-scraper:
    name: Deploy Scraper
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [deploy-backend]
    permissions:
      contents: "read"
      id-token: "write"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.GCP_ARTIFACT_REGISTRY }} --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push scraper image
        uses: docker/build-push-action@v6
        with:
          context: ./scraper
          push: true
          tags: |
            ${{ env.GCP_ARTIFACT_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/edilengine/edilengine-scraper:${{ env.IMAGE_TAG }}
            ${{ env.GCP_ARTIFACT_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/edilengine/edilengine-scraper:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy Cloud Run Job
        run: |
          gcloud run jobs update edilengine-scraper \
            --region ${{ env.GCP_REGION }} \
            --image ${{ env.GCP_ARTIFACT_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/edilengine/edilengine-scraper:${{ env.IMAGE_TAG }} \
            --set-env-vars DATABASE_URL=${{ secrets.DATABASE_URL }},OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} \
            --cpu 2 \
            --memory 4Gi \
            --timeout 3600 \
            --max-retries 3 \
            --quiet || \
          gcloud run jobs create edilengine-scraper \
            --region ${{ env.GCP_REGION }} \
            --image ${{ env.GCP_ARTIFACT_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/edilengine/edilengine-scraper:${{ env.IMAGE_TAG }} \
            --set-env-vars DATABASE_URL=${{ secrets.DATABASE_URL }},OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} \
            --cpu 2 \
            --memory 4Gi \
            --timeout 3600 \
            --max-retries 3 \
            --quiet

      - name: Verify deployment
        run: |
          gcloud run jobs describe edilengine-scraper \
            --region ${{ env.GCP_REGION }} \
            --format "value(spec.template.spec.containers[0].image)"
